<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5c542">
  <meta name="color-scheme" content="light">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mitmach-Welt">
  <meta name="description" content="Mitmach-Welt – eine motivierende Aufgaben-App für Kinder in Wohngruppen.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Mitmach-Welt</title>
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="topbar">
      <button class="icon-button" id="backButton" type="button" aria-label="Zurück" hidden>←</button>
      <div class="title-block">
        <p class="eyebrow">Projekt Sonnenblume · v1.1</p>
        <h1 id="screenTitle">Mitmach-Welt</h1>
      </div>
      <button class="icon-button" id="homeButton" type="button" aria-label="Startseite">⌂</button>
    </header>

    <main id="app" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button type="button" data-nav="home"><span class="nav-icon">🏠</span><span>Start</span></button>
      <button type="button" data-nav="round"><span class="nav-icon">🌻</span><span>Runde</span></button>
      <button type="button" data-nav="worlds"><span class="nav-icon">🌍</span><span>Welten</span></button>
      <button type="button" data-nav="educator"><span class="nav-icon">🔒</span><span>Erzieher</span></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast" role="status"></div>
  <div id="confettiRoot" class="confetti-root" aria-hidden="true"></div>
  <div id="updateBanner" class="update-banner" hidden>
    <span>Eine neue Version ist bereit.</span>
    <button id="reloadApp" type="button">Jetzt laden</button>
  </div>

  <noscript>Für die Mitmach-Welt muss JavaScript aktiviert sein.</noscript>
  <script src="./app.js" defer></script>
</body>
</html>
