<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6c84d">
  <meta name="color-scheme" content="light">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mitmach-Welt">
  <meta name="description" content="Mitmach-Welt – Aufgaben, persönliche Ziele und gemeinsame Erfolge für Kinder in Wohngruppen.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Mitmach-Welt 2.1.3</title>
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="topbar">
      <button class="round-icon-button" id="backButton" type="button" aria-label="Zurück" hidden>←</button>
      <div class="brand-block">
        <span class="brand-flower" aria-hidden="true">🌻</span>
        <div>
          <p class="eyebrow">Projekt Sonnenblume · Version 2.1.3</p>
          <h1 id="screenTitle">Mitmach-Welt</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="round-icon-button sync-icon-button" id="syncButton" type="button" aria-label="Geräte & Synchronisierung" title="Geräte & Synchronisierung">☁️</button>
        <button class="round-icon-button" id="homeButton" type="button" aria-label="Startseite">⌂</button>
      </div>
    </header>

    <main id="app" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button type="button" data-nav="home"><span>🏠</span><b>Start</b></button>
      <button type="button" data-nav="group"><span>🌍</span><b>Gruppenwelt</b></button>
      <button type="button" data-nav="educator"><span>🔒</span><b>Erzieher</b></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast" role="status"></div>
  <div id="confettiRoot" class="confetti-root" aria-hidden="true"></div>
  <div id="updateBanner" class="update-banner" hidden>
    <span>Eine neue Version ist bereit.</span>
    <button id="reloadApp" type="button">Jetzt laden</button>
  </div>

  <noscript>Für die Mitmach-Welt muss JavaScript aktiviert sein.</noscript>
  <script src="./app.js" defer></script>
  <script src="./sync.js" defer></script>
</body>
</html>
