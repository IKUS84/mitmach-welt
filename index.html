<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5c542"><meta name="apple-mobile-web-app-capable" content="yes"><title>Mitmach-Welt</title><link rel="manifest" href="manifest.webmanifest"><style>
:root{--ink:#26362e;--muted:#6b786f;--yellow:#f5c542;--green:#4f9c6b;--card:rgba(255,255,255,.94)}*{box-sizing:border-box}body{margin:0;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(#dff4ff 0 39%,#e9f7d7 39%)}button,input,select{font:inherit}button{touch-action:manipulation}.shell{max-width:900px;margin:auto;min-height:100dvh;padding-bottom:88px}.top{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:46px 1fr 46px;gap:8px;align-items:center;padding:max(12px,env(safe-area-inset-top)) 14px 10px;background:rgba(255,255,255,.86);backdrop-filter:blur(16px);border-bottom:1px solid #0001}.top h1{font-size:1.3rem;margin:0}.eyebrow{margin:0;color:var(--muted);font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.icon{border:0;background:#fff;border-radius:14px;width:42px;height:42px;box-shadow:0 8px 20px #2334;font-size:1.25rem}.screen{padding:18px 15px 30px}.hero,.card{background:var(--card);border:1px solid #0001;border-radius:25px;box-shadow:0 14px 34px #2942;padding:20px}.hero{background:linear-gradient(145deg,#fff4b2,#fff);margin-bottom:16px;overflow:hidden}.mascot{font-size:4.6rem;display:inline-block;animation:sway 3.5s ease-in-out infinite}@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}.hero h2{font-size:2rem;margin:8px 0}.hero p,.muted{color:var(--muted)}.primary,.secondary{width:100%;border:0;border-radius:18px;padding:16px;font-weight:850}.primary{background:linear-gradient(#ffe577,var(--yellow));color:#3a2b00;box-shadow:0 10px 22px #d99d0044}.secondary{background:#fff;border:2px solid #4f9c6b33}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.child,.task{text-align:left;border:3px solid transparent}.child.sel{border-color:var(--yellow);background:#fff9d1}.avatar{display:block;font-size:2.7rem;margin-bottom:8px}.actions{display:grid;gap:10px;margin-top:14px}.list{display:grid;gap:10px}.row{display:flex;gap:12px;align-items:center;background:#fff;border-radius:18px;padding:13px;box-shadow:0 8px 20px #2941}.grow{flex:1}.num{width:36px;height:36px;display:grid;place-items:center;border-radius:50%;background:#fff0a1;font-weight:900}.world{position:relative;min-height:360px;border-radius:28px;overflow:hidden;background:linear-gradient(#bde8ff 0 52%,#91cd68 52%);border:4px solid #ffffffaa;box-shadow:0 14px 34px #2942}.world-name{position:absolute;left:16px;top:14px;background:#ffffffdd;padding:9px 12px;border-radius:13px;font-weight:850}.sun{position:absolute;right:18px;top:18px;font-size:3.5rem}.obj{position:absolute;font-size:2.6rem;filter:drop-shadow(0 6px 5px #0002)}.tree{font-size:4.2rem;bottom:38px;left:53%}.f1{bottom:16px;left:14%}.f2{bottom:20px;left:34%}.f3{bottom:14px;right:12%}.animal{bottom:60px;left:20%}.bench{bottom:20px;right:31%;font-size:3rem}.seed{bottom:18px;left:48%}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(900px,100%);display:grid;grid-template-columns:repeat(3,1fr);background:#fffffff2;backdrop-filter:blur(16px);padding:8px 10px max(8px,env(safe-area-inset-bottom));border-top:1px solid #0001}.nav button{border:0;background:transparent;border-radius:15px;padding:7px;display:grid;place-items:center;font-size:1.15rem}.nav span{font-size:.7rem;font-weight:800}.nav .active{background:#fff1a9}.pin{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:360px;margin:auto}.pin button{border:0;background:white;border-radius:16px;min-height:60px;font-size:1.25rem;font-weight:850;box-shadow:0 8px 18px #2941}.pinshow{text-align:center;font-size:2rem;letter-spacing:.35em;min-height:50px}.form{display:grid;gap:7px;margin-bottom:13px}.form input,.form select{padding:14px;border:1px solid #0002;border-radius:14px;background:#fff}.toast{position:fixed;left:50%;bottom:100px;transform:translate(-50%,15px);opacity:0;background:#21372a;color:white;padding:12px 16px;border-radius:14px;transition:.2s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}@media(min-width:700px){.screen{padding:26px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style></head><body><div class="shell"><header class="top"><button id="back" class="icon" hidden>←</button><div><p class="eyebrow">Projekt Sonnenblume</p><h1 id="title">Mitmach-Welt</h1></div><button id="home" class="icon">⌂</button></header><main id="app" class="screen"></main><nav class="nav"><button data-nav="home" class="active">🏠<span>Start</span></button><button data-nav="worlds">🌍<span>Welten</span></button><button data-nav="educator">🔒<span>Erzieher</span></button></nav></div><div id="toast" class="toast"></div><script>
const DCH=[{id:'lucy',name:'Lucy',avatar:'🦊',seeds:2,coins:10,completed:0},{id:'noah',name:'Noah',avatar:'🐼',seeds:3,coins:15,completed:0},{id:'tius',name:'Tius',avatar:'🦁',seeds:1,coins:5,completed:0},{id:'jari',name:'Jari',avatar:'🐸',seeds:2,coins:8,completed:0}],DTA=[{id:'bed',title:'Bett machen',icon:'🛏️',reward:5,seeds:1},{id:'table',title:'Tisch decken',icon:'🍽️',reward:6,seeds:1},{id:'toys',title:'Spielsachen aufräumen',icon:'🧸',reward:5,seeds:1},{id:'laundry',title:'Wäsche einsammeln',icon:'🧺',reward:6,seeds:1},{id:'plants',title:'Blumen gießen',icon:'🪴',reward:4,seeds:1},{id:'room',title:'Zimmer aufräumen',icon:'🧹',reward:8,seeds:2}];
const S={screen:'home',history:[],selected:[],order:[],assign:{},idx:0,pending:null,pin:'',unlocked:false};const app=document.getElementById('app'),ttl=document.getElementById('title'),back=document.getElementById('back'),toast=document.getElementById('toast');function init(){if(!localStorage.mw_children)localStorage.mw_children=JSON.stringify(DCH);if(!localStorage.mw_tasks)localStorage.mw_tasks=JSON.stringify(DTA);if(!localStorage.mw_pin)localStorage.mw_pin='2468'}function kids(){return JSON.parse(localStorage.mw_children)}function tasks(){return JSON.parse(localStorage.mw_tasks)}function saveKids(x){localStorage.mw_children=JSON.stringify(x)}function msg(x){toast.textContent=x;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000)}function go(x,h=true){if(h&&S.screen!==x)S.history.push(S.screen);S.screen=x;render()}function chrome(x){ttl.textContent=x;back.hidden=S.screen==='home';document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===S.screen))}back.onclick=()=>{S.screen=S.history.pop()||'home';render()};document.getElementById('home').onclick=()=>{S.history=[];S.screen='home';render()};document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));
function home(){chrome('Mitmach-Welt');let done=kids().reduce((a,c)=>a+c.completed,0);app.innerHTML=`<section class="hero"><div class="mascot">🌻</div><h2>Hallo, ihr Lieben!</h2><p>Heute kann eure eigene Welt und eure Gruppenwelt wieder wachsen.</p><div class="actions"><button class="primary" id="start">🌻 Mitmach-Runde starten</button></div></section><section class="grid"><article class="card"><span class="avatar">👧</span><strong>${kids().length} Kinder</strong></article><article class="card"><span class="avatar">✅</span><strong>${done} Aufgaben</strong></article><article class="card"><span class="avatar">🏡</span><strong>Unsere Welt</strong></article></section>`;start.onclick=()=>{S.selected=[];S.order=[];S.assign={};S.idx=0;go('select')}}
function select(){chrome('Wer macht heute mit?');app.innerHTML=`<h2>Kinder auswählen</h2><p class="muted">${S.selected.length} ausgewählt</p><section class="grid">${kids().map(c=>`<button class="card child ${S.selected.includes(c.id)?'sel':''}" data-k="${c.id}"><span class="avatar">${c.avatar}</span><strong>${c.name}</strong><p class="muted">${S.selected.includes(c.id)?'Ausgewählt ✓':'Antippen'}</p></button>`).join('')}</section><div class="actions"><button class="primary" id="lot">Reihenfolge auslosen</button></div>`;document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{let id=b.dataset.k;S.selected=S.selected.includes(id)?S.selected.filter(x=>x!==id):[...S.selected,id];select()});lot.onclick=()=>{if(!S.selected.length)return msg('Bitte mindestens ein Kind auswählen.');S.order=[...S.selected].sort(()=>Math.random()-.5);go('order')}}
function order(){chrome('Die Sonnenblume lost aus');let ks=kids();app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot">🌻</div><h2>Die Reihenfolge steht!</h2><p>Alle wählen zuerst ihre Aufgabe. Danach legen alle gleichzeitig los.</p></section><div class="list">${S.order.map((id,i)=>{let c=ks.find(x=>x.id===id);return`<div class="row"><div class="num">${i+1}</div><span class="avatar" style="margin:0">${c.avatar}</span><strong>${c.name}</strong></div>`}).join('')}</div><div class="actions"><button class="primary" id="choose">Aufgaben auswählen</button></div>`;choose.onclick=()=>{S.idx=0;go('choose')}}
function choose(){let id=S.order[S.idx],c=kids().find(x=>x.id===id),taken=Object.values(S.assign);chrome(c.name+' wählt');app.innerHTML=`<section class="hero"><div class="mascot">${c.avatar}</div><h2>${c.name}, welche Aufgabe möchtest du?</h2><p>Gewählte Aufgaben verschwinden aus der Liste.</p></section><section class="grid">${tasks().filter(t=>!taken.includes(t.id)).map(t=>`<button class="card task" data-t="${t.id}"><span class="avatar">${t.icon}</span><strong>${t.title}</strong><p class="muted">🌱 ${t.seeds} · 🪙 ${t.reward}</p></button>`).join('')}</section>`;document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{S.assign[id]=b.dataset.t;if(S.idx<S.order.length-1){S.idx++;choose()}else go('overview')})}
function overview(){chrome('Heute übernimmt');let ks=kids(),ts=tasks();app.innerHTML=`<section class="hero"><h2>Alle können jetzt loslegen</h2><p>Niemand muss auf die Bestätigung eines anderen Kindes warten.</p></section><div class="list">${S.order.map(id=>{let c=ks.find(x=>x.id===id),t=ts.find(x=>x.id===S.assign[id]);return`<div class="row"><span class="avatar" style="margin:0">${c.avatar}</span><div class="grow"><strong>${c.name}</strong><div>${t.icon} ${t.title}</div></div><button class="secondary" style="width:auto" data-done="${id}">Ich bin fertig</button></div>`}).join('')}</div><div class="actions"><button class="secondary" id="again">Neue Runde</button></div>`;document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>{S.pending=b.dataset.done;S.pin='';go('pin')});again.onclick=()=>go('select')}
function pin(){chrome('Erzieher bestätigen');app.innerHTML=`<section class="card"><h2 style="text-align:center">Erzieher-PIN</h2><p class="muted" style="text-align:center">Test-PIN: 2468</p><div class="pinshow">${'•'.repeat(S.pin.length)}</div><div class="pin">${[1,2,3,4,5,6,7,8,9,'⌫',0,'✓'].map(x=>`<button data-key="${x}">${x}</button>`).join('')}</div></section>`;document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>{let k=b.dataset.key;if(k==='⌫')S.pin=S.pin.slice(0,-1);else if(k==='✓'){if(S.pin===localStorage.mw_pin)go('confirm');else{S.pin='';msg('PIN ist nicht richtig.');pin()}return}else if(S.pin.length<4)S.pin+=k;pin()})}
function confirm(){let c=kids().find(x=>x.id===S.pending),t=tasks().find(x=>x.id===S.assign[S.pending]);chrome('Leistung bestätigen');app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot">${c.avatar}</div><h2>${c.name}</h2><p>${t.icon} ${t.title}</p></section><div class="actions"><button class="primary" data-r="super">🌟 Super gemacht</button><button class="secondary" data-r="almost">🌱 Fast geschafft</button><button class="secondary" data-r="together">🤝 Gemeinsam geschafft</button></div>`;document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{let r=b.dataset.r,list=kids(),i=list.findIndex(x=>x.id===S.pending),coins=Math.max(1,Math.round(t.reward*(r==='super'?1:.75))),seeds=r==='almost'?0:t.seeds;list[i].coins+=coins;list[i].seeds+=seeds;list[i].completed++;saveKids(list);S.reward={child:list[i],coins,seeds,result:r};go('reward')})}
function world(c){return`<section class="world"><div class="world-name">${c.avatar} ${c.name}s Welt</div><div class="sun">${c.completed>=8?'🌈':'☀️'}</div><div class="obj f1">🌼</div>${c.seeds>=2?'<div class="obj f2">🌷</div>':''}${c.seeds>=3?'<div class="obj f3">🌻</div>':''}${c.seeds>=4?'<div class="obj tree">🌳</div>':'<div class="obj seed">🌱</div>'}${c.seeds>=6?'<div class="obj animal">🦋</div>':''}${c.coins>=20?'<div class="obj bench">🪑</div>':''}</section><section class="grid" style="margin-top:12px"><article class="card">🌱 <strong>${c.seeds}</strong></article><article class="card">🪙 <strong>${c.coins}</strong></article><article class="card">✅ <strong>${c.completed}</strong></article></section>`}
function reward(){let r=S.reward;chrome('Belohnung');app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot">🌻</div><h2>${r.child.name}, deine Welt ist gewachsen!</h2><p>🪙 +${r.coins} Münzen &nbsp; 🌱 +${r.seeds} Samen</p></section>${world(r.child)}<div class="actions"><button class="primary" id="ov">Zur Aufgabenübersicht</button><button class="secondary" id="cw">Meine Welt ansehen</button></div>`;ov.onclick=()=>go('overview');cw.onclick=()=>{S.world=r.child.id;go('childWorld')}}
function worlds(){chrome('Mitmach-Welten');app.innerHTML=`<h2>Eigene Welten</h2><section class="grid">${kids().map(c=>`<button class="card child" data-w="${c.id}"><span class="avatar">${c.avatar}</span><strong>${c.name}</strong><p class="muted">🌱 ${c.seeds} · 🪙 ${c.coins}</p></button>`).join('')}</section><h2 style="margin-top:22px">Unsere Gruppenwelt</h2><section class="world"><div class="world-name">🏡 Unsere Welt</div><div class="sun">☀️</div><div class="obj tree">🌳</div><div class="obj f1">🌼</div><div class="obj f3">🌻</div></section>`;document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>{S.world=b.dataset.w;go('childWorld')})}
function childWorld(){let c=kids().find(x=>x.id===S.world)||kids()[0];chrome(c.name+'s Welt');app.innerHTML=world(c)}
function educator(){chrome('Erzieherbereich');if(!S.unlocked){app.innerHTML=`<section class="card"><h2>Geschützter Bereich</h2><p class="muted">Standard-PIN: 2468</p><div class="form"><label>PIN</label><input id="ep" type="password" inputmode="numeric" maxlength="4"></div><button class="primary" id="unlock">Öffnen</button></section>`;unlock.onclick=()=>{if(ep.value===localStorage.mw_pin){S.unlocked=true;educator()}else msg('PIN ist nicht richtig.')};return}app.innerHTML=`<section class="grid"><button class="card child" id="manage"><span class="avatar">👧</span><strong>Kinder verwalten</strong></button><button class="card child" id="reset"><span class="avatar">↺</span><strong>Testdaten zurücksetzen</strong></button></section>`;manage.onclick=()=>go('manage');reset.onclick=()=>{if(confirm('Alle Testdaten zurücksetzen?')){localStorage.removeItem('mw_children');localStorage.removeItem('mw_tasks');init();msg('Zurückgesetzt.');educator()}}}
function manage(){chrome('Kinder verwalten');app.innerHTML=`<div class="list">${kids().map(c=>`<div class="row"><span class="avatar" style="margin:0">${c.avatar}</span><div><strong>${c.name}</strong><div class="muted">🌱 ${c.seeds} · 🪙 ${c.coins}</div></div></div>`).join('')}</div><section class="card" style="margin-top:14px"><h2>Neues Kind</h2><div class="form"><label>Name oder Spitzname</label><input id="nn" maxlength="20"></div><div class="form"><label>Avatar</label><select id="na"><option>🦊</option><option>🐼</option><option>🦁</option><option>🐸</option><option>🐨</option><option>🦄</option><option>🐯</option></select></div><button class="primary" id="add">Kind anlegen</button></section>`;add.onclick=()=>{let n=nn.value.trim();if(!n)return msg('Bitte Namen eintragen.');let x=kids();x.push({id:'c'+Date.now(),name:n,avatar:na.value,seeds:0,coins:0,completed:0});saveKids(x);msg(n+' wurde angelegt.');manage()}}
function render(){({home,select,order,choose,overview,pin,confirm,reward,worlds,childWorld,educator,manage}[S.screen]||home)()}init();render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script></body></html>
