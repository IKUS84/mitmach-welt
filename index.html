ding:16px;font-weight:850}.primary{background:linear-gradient(#ffe783,var(--yellow));color:#3a2b00;box-shadow:0 10px 22px #d99d0044}.secondary{background:#fff;border:2px solid #4f9c6b33;color:var(--ink)}.danger{background:#fff;border:2px solid #c9565633;color:var(--red)}.primary:disabled{opacity:.45}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.child,.task{text-align:left;border:3px solid transparent;transition:.18s}.child.sel,.task.sel{border-color:var(--yellow);background:#fff9d1;transform:translateY(-2px)}.avatar{display:block;font-size:2.8rem;margin-bottom:8px}.actions{display:grid;gap:10px;margin-top:14px}.inline{display:flex;gap:10px}.inline>*{flex:1}.list{display:grid;gap:10px}.row{display:flex;gap:12px;align-items:center;background:#fff;border-radius:18px;padding:13px;box-shadow:0 8px 20px #2941}.grow{flex:1}.num{width:38px;height:38px;display:grid;place-items:center;border-radius:50%;background:#fff0a1;font-weight:900}.status{display:inline-flex;align-items:center;gap:5px;padding:6px 9px;border-radius:999px;background:#fff2b9;font-size:.78rem;font-weight:850}.status.done{background:#def2e2;color:#34734b}.progressbox{background:#fff;border-radius:22px;padding:16px;box-shadow:0 10px 24px #2941;margin-bottom:14px}.progresshead{display:flex;justify-content:space-between;gap:10px;align-items:center}.progress{height:14px;background:#efe8cd;border-radius:999px;overflow:hidden;margin-top:10px}.progress>div{height:100%;background:linear-gradient(90deg,var(--yellow),#7fbd69);border-radius:999px;transition:.4s}.world{position:relative;min-height:370px;border-radius:30px;overflow:hidden;background:linear-gradient(#bde8ff 0 52%,#91cd68 52%);border:4px solid #ffffffaa;box-shadow:var(--shadow)}.world-name{position:absolute;left:16px;top:14px;background:#ffffffdf;padding:9px 12px;border-radius:13px;font-weight:850;z-index:2}.sun{position:absolute;right:18px;top:18px;font-size:3.7rem}.cloud{position:absolute;left:30%;top:58px;font-size:3rem;opacity:.72;animation:float 8s ease-in-out infinite}@keyframes float{0%,100%{transform:translateX(-15px)}50%{transform:translateX(20px)}}.obj{position:absolute;font-size:2.6rem;filter:drop-shadow(0 6px 5px #0002)}.tree{font-size:4.4rem;bottom:38px;left:53%}.f1{bottom:16px;left:14%}.f2{bottom:20px;left:34%}.f3{bottom:14px;right:12%}.animal{bottom:62px;left:20%;animation:bob 2.2s ease-in-out infinite}@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}.bench{bottom:20px;right:31%;font-size:3rem}.seed{bottom:18px;left:48%}.house{bottom:37px;right:10%;font-size:4.2rem}.pond{bottom:10px;left:42%;font-size:4rem}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(920px,100%);display:grid;grid-template-columns:repeat(3,1fr);background:#fffffff3;backdrop-filter:blur(18px);padding:8px 10px max(8px,env(safe-area-inset-bottom));border-top:1px solid #0001;z-index:30}.nav button{border:0;background:transparent;border-radius:15px;padding:7px;display:grid;place-items:center;font-size:1.15rem}.nav span{font-size:.7rem;font-weight:800}.nav .active{background:#fff1a9}.pin{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:360px;margin:auto}.pin button{border:0;background:white;border-radius:16px;min-height:60px;font-size:1.25rem;font-weight:850;box-shadow:0 8px 18px #2941}.pinshow{text-align:center;font-size:2rem;letter-spacing:.35em;min-height:50px}.form{display:grid;gap:7px;margin-bottom:13px}.form input,.form select{padding:14px;border:1px solid #0002;border-radius:14px;background:#fff}.toast{position:fixed;left:50%;bottom:102px;transform:translate(-50%,15px);opacity:0;background:#21372a;color:white;padding:12px 16px;border-radius:14px;transition:.2s;z-index:60;max-width:90%;text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}.confetti{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}.confetti i{position:absolute;top:-20px;font-style:normal;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}.empty{text-align:center;padding:30px}.tiny{font-size:.8rem}.divider{height:1px;background:#0001;margin:16px 0}@media(min-width:700px){.screen{padding:26px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}

<body>
<div class="shell"><header class="top"><button id="back" class="icon" hidden>←</button><div><p class="eyebrow">Projekt Sonnenblume · v0.2</p><h1 id="title">Mitmach-Welt</h1></div><button id="home" class="icon">⌂</button></header><main id="app" class="screen"></main><nav class="nav"><button data-nav="home" class="active">🏠<span>Start</span></button><button data-nav="worlds">🌍<span>Welten</span></button><button data-nav="educator">🔒<span>Erzieher</span></button></nav></div><div id="toast" class="toast"></div><div id="confetti" class="confetti"></div>
<script>
const DCH=[{id:'lucy',name:'Lucy',avatar:'🦊',seeds:2,coins:10,completed:0},{id:'noah',name:'Noah',avatar:'🐼',seeds:3,coins:15,completed:0},{id:'tius',name:'Tius',avatar:'🦁',seeds:1,coins:5,completed:0},{id:'jari',name:'Jari',avatar:'🐸',seeds:2,coins:8,completed:0}],DTA=[{id:'bed',title:'Bett machen',icon:'🛏️',reward:5,seeds:1},{id:'table',title:'Tisch decken',icon:'🍽️',reward:6,seeds:1},{id:'toys',title:'Spielsachen aufräumen',icon:'🧸',reward:5,seeds:1},{id:'laundry',title:'Wäsche einsammeln',icon:'🧺',reward:6,seeds:1},{id:'plants',title:'Blumen gießen',icon:'🪴',reward:4,seeds:1},{id:'room',title:'Zimmer aufräumen',icon:'🧹',reward:8,seeds:2},{id:'trash',title:'Müll rausbringen',icon:'🗑️',reward:6,seeds:1},{id:'shoes',title:'Schuhe ordnen',icon:'👟',reward:4,seeds:1}];
const S={screen:'home',history:[],selected:[],order:[],assign:{},roundStatus:{},idx:0,pending:null,pin:'',unlocked:false,world:null,lastReward:null};
const app=document.getElementById('app'),ttl=document.getElementById('title'),back=document.getElementById('back'),toast=document.getElementById('toast'),confetti=document.getElementById('confetti');
function init(){if(!localStorage.mw_children)localStorage.mw_children=JSON.stringify(DCH);if(!localStorage.mw_tasks)localStorage.mw_tasks=JSON.stringify(DTA);if(!localStorage.mw_pin)localStorage.mw_pin='2468';if(!localStorage.mw_group)localStorage.mw_group=JSON.stringify({points:0,bonuses:0})}function kids(){return JSON.parse(localStorage.mw_children||'[]')}function tasks(){return JSON.parse(localStorage.mw_tasks||'[]')}function group(){return JSON.parse(localStorage.mw_group||'{"points":0,"bonuses":0}')}function saveKids(x){localStorage.mw_children=JSON.stringify(x)}function saveTasks(x){localStorage.mw_tasks=JSON.stringify(x)}function saveGroup(x){localStorage.mw_group=JSON.stringify(x)}function msg(x){toast.textContent=x;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2100)}function celebrate(){confetti.innerHTML='';for(let i=0;i<30;i++){let e=document.createElement('i');e.textContent=['🌻','✨','🌼','🌱'][Math.floor(Math.random()*4)];e.style.left=Math.random()*100+'%';e.style.animationDelay=Math.random()*.45+'s';e.style.fontSize=(18+Math.random()*16)+'px';confetti.appendChild(e)}setTimeout(()=>confetti.innerHTML='',2300)}function go(x,h=true){if(h&&S.screen!==x)S.history.push(S.screen);S.screen=x;render()}function chrome(x){ttl.textContent=x;back.hidden=S.screen==='home';document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===S.screen))}back.onclick=()=>{S.screen=S.history.pop()||'home';render()};document.getElementById('home').onclick=()=>{S.history=[];S.screen='home';render()};document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));
function home(){chrome('Mitmach-Welt');let done=kids().reduce((a,c)=>a+c.completed,0),g=group();app.innerHTML=`<section class="hero"><div class="mascot">🌻</div><h2>Hallo, ihr Lieben!</h2><p>Heute kann eure eigene Welt und eure Gruppenwelt wieder ein Stück wachsen.</p><div class="actions"><button class="primary" id="start">🌻 Mitmach-Runde starten</button></div></section><section class="grid"><article class="card"><span class="avatar">👧</span><strong>${kids().length} Kinder</strong><p class="muted tiny">in der Mitmach-Welt</p></article><article class="card"><span class="avatar">✅</span><strong>${done} Aufgaben</strong><p class="muted tiny">insgesamt geschafft</p></article><article class="card"><span class="avatar">🏡</span><strong>${g.points} Gruppenpunkte</strong><p class="muted tiny">für unsere Welt</p></article></section>`;start.onclick=()=>{S.selected=[];S.order=[];S.assign={};S.roundStatus={};S.idx=0;go('select')}}
function select(){chrome('Wer macht heute mit?');app.innerHTML=`<h2>Kinder auswählen</h2><p class="muted">${S.selected.length} ausgewählt</p><section class="grid">${kids().map(c=>`<button class="card child ${S.selected.includes(c.id)?'sel':''}" data-k="${c.id}"><span class="avatar">${c.avatar}</span><strong>${c.name}</strong><p class="muted">${S.selected.includes(c.id)?'Ausgewählt ✓':'Antippen'}</p></button>`).join('')}</section><div class="actions"><button class="primary" id="lot" ${S.selected.length?'':'disabled'}>🌻 Reihenfolge auslosen</button></div>`;document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{let id=b.dataset.k;S.selected=S.selected.includes(id)?S.selected.filter(x=>x!==id):[...S.selected,id];select()});lot.onclick=()=>{S.order=[...S.selected].sort(()=>Math.random()-.5);S.order.forEach(id=>S.roundStatus[id]='open');go('order')}}
function order(){chrome('Die Sonnenblume lost aus');let ks=kids();app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot spin">🌻</div><h2>Die Reihenfolge steht!</h2><p>Alle wählen zuerst ihre Aufgabe. Danach legen alle gleichzeitig los.</p></section><div class="list">${S.order.map((id,i)=>{let c=ks.find(x=>x.id===id);return`<div class="row"><div class="num">${i+1}</div><span class="avatar" style="margin:0">${c.avatar}</span><strong>${c.name}</strong></div>`}).join('')}</div><div class="actions"><button class="primary" id="choose">Aufgaben auswählen</button></div>`;choose.onclick=()=>{S.idx=0;go('choose')}}
function choose(){let id=S.order[S.idx],c=kids().find(x=>x.id===id),taken=Object.values(S.assign);chrome(c.name+' wählt');let available=tasks().filter(t=>!taken.includes(t.id));app.innerHTML=`<section class="hero"><div class="mascot">${c.avatar}</div><h2>${c.name}, welche Aufgabe möchtest du?</h2><p>Gewählte Aufgaben verschwinden automatisch aus der Liste.</p></section><section class="grid">${available.map(t=>`<button class="card task" data-t="${t.id}"><span class="avatar">${t.icon}</span><strong>${t.title}</strong><p class="muted">🌱 ${t.seeds} · 🪙 ${t.reward}</p></button>`).join('')}</section>`;document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{S.assign[id]=b.dataset.t;if(S.idx<S.order.length-1){S.idx++;choose()}else go('overview')})}
function overview(){chrome('Heute übernimmt');let ks=kids(),ts=tasks(),doneCount=S.order.filter(id=>S.roundStatus[id]==='done').length,total=S.order.length,pct=total?Math.round(doneCount/total*100):0;app.innerHTML=`<div class="progressbox"><div class="progresshead"><div><strong>🌞 Tagesziel</strong><div class="muted tiny">${doneCount} von ${total} Aufgaben bestätigt</div></div><strong>${pct}%</strong></div><div class="progress"><div style="width:${pct}%"></div></div></div><div class="list">${S.order.map(id=>{let c=ks.find(x=>x.id===id),t=ts.find(x=>x.id===S.assign[id]),st=S.roundStatus[id];return`<div class="row"><span class="avatar" style="margin:0">${c.avatar}</span><div class="grow"><strong>${c.name}</strong><div>${t.icon} ${t.title}</div><div class="status ${st==='done'?'done':''}">${st==='done'?'✅ Bestätigt':'⏳ Noch offen'}</div></div>${st==='done'?'<span style="font-size:1.8rem">🌼</span>':`<button class="secondary" style="width:auto" data-done="${id}">Ich bin fertig</button>`}</div>`}).join('')}</div><div class="actions"><button class="secondary" id="again">Neue Runde beginnen</button></div>`;document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>{S.pending=b.dataset.done;S.pin='';go('pin')});again.onclick=()=>{S.selected=[];S.order=[];S.assign={};S.roundStatus={};go('select')}}
function pin(){chrome('Erzieher bestätigen');app.innerHTML=`<section class="card"><h2 style="text-align:center">Erzieher-PIN</h2><p class="muted" style="text-align:center">Test-PIN: 2468</p><div class="pinshow">${'•'.repeat(S.pin.length)}</div><div class="pin">${[1,2,3,4,5,6,7,8,9,'⌫',0,'✓'].map(x=>`<button data-key="${x}">${x}</button>`).join('')}</div></section>`;document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>{let k=b.dataset.key;if(k==='⌫')S.pin=S.pin.slice(0,-1);else if(k==='✓'){if(S.pin===localStorage.mw_pin)go('confirm');else{S.pin='';msg('PIN ist nicht richtig.');pin()}return}else if(S.pin.length<4)S.pin+=k;pin()})}
function confirm(){let c=kids().find(x=>x.id===S.pending),t=tasks().find(x=>x.id===S.assign[S.pending]);chrome('Leistung bestätigen');app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot">${c.avatar}</div><h2>${c.name}</h2><p>${t.icon} ${t.title}</p></section><div class="actions"><button class="primary" data-r="super">🌟 Super gemacht</button><button class="secondary" data-r="almost">🌱 Fast geschafft</button><button class="secondary" data-r="together">🤝 Gemeinsam geschafft</button></div>`;document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{let r=b.dataset.r,list=kids(),i=list.findIndex(x=>x.id===S.pending),coins=Math.max(1,Math.round(t.reward*(r==='super'?1:.75))),seeds=r==='almost'?0:t.seeds;list[i].coins+=coins;list[i].seeds+=seeds;list[i].completed++;saveKids(list);S.roundStatus[S.pending]='done';let g=group();g.points+=1;let allDone=S.order.every(id=>S.roundStatus[id]==='done');if(allDone){g.points+=3;g.bonuses+=1}saveGroup(g);S.lastReward={child:list[i],coins,seeds,result:r,allDone};celebrate();go('reward')})}
function world(c){return`<section class="world"><div class="world-name">${c.avatar} ${c.name}s Welt</div><div class="sun">${c.completed>=8?'🌈':'☀️'}</div><div class="cloud">☁️</div><div class="obj f1">🌼</div>${c.seeds>=2?'<div class="obj f2">🌷</div>':''}${c.seeds>=3?'<div class="obj f3">🌻</div>':''}${c.seeds>=4?'<div class="obj tree">🌳</div>':'<div class="obj seed">🌱</div>'}${c.seeds>=6?'<div class="obj animal">🦋</div>':''}${c.coins>=20?'<div class="obj bench">🪑</div>':''}</section><section class="grid" style="margin-top:12px"><article class="card">🌱 <strong>${c.seeds}</strong><p class="muted tiny">Samen</p></article><article class="card">🪙 <strong>${c.coins}</strong><p class="muted tiny">Münzen</p></article><article class="card">✅ <strong>${c.completed}</strong><p class="muted tiny">Aufgaben</p></article></section>`}
function groupWorld(){let g=group();return`<section class="world"><div class="world-name">🏡 Unsere Welt</div><div class="sun">${g.points>=15?'🌈':'☀️'}</div><div class="cloud">☁️</div><div class="obj tree">🌳</div><div class="obj f1">🌼</div><div class="obj f3">🌻</div>${g.points>=5?'<div class="obj bench">🪑</div>':''}${g.points>=10?'<div class="obj pond">💧</div>':''}${g.points>=18?'<div class="obj house">🏡</div>':''}</section><section class="grid" style="margin-top:12px"><article class="card">🤝 <strong>${g.points}</strong><p class="muted tiny">Gruppenpunkte</p></article><article class="card">🎁 <strong>${g.bonuses}</strong><p class="muted tiny">Teamboni</p></article></section>`}
function reward(){let r=S.lastReward;chrome('Belohnung');app.innerHTML=`<section class="hero" style="text-align:center"><div class="mascot">🌻</div><h2>${r.child.name}, deine Welt ist gewachsen!</h2><p>🪙 +${r.coins} Münzen &nbsp; 🌱 +${r.seeds} Samen</p>${r.allDone?'<p><strong>🎉 Teamziel erreicht: +3 Gruppenpunkte!</strong></p>':''}</section>${world(r.child)}<div class="actions"><button class="primary" id="ov">Zur Aufgabenübersicht</button><button class="secondary" id="cw">Meine Welt ansehen</button></div>`;ov.onclick=()=>go('overview');cw.onclick=()=>{S.world=r.child.id;go('childWorld')}}
function worlds(){chrome('Mitmach-Welten');app.innerHTML=`<h2>Eigene Welten</h2><section class="grid">${kids().map(c=>`<button class="card child" data-w="${c.id}"><span class="avatar">${c.avatar}</span><strong>${c.name}</strong><p class="muted">🌱 ${c.seeds} · 🪙 ${c.coins}</p></button>`).join('')}</section><h2 style="margin-top:22px">Unsere Gruppenwelt</h2>${groupWorld()}`;document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>{S.world=b.dataset.w;go('childWorld')})}
function childWorld(){let c=kids().find(x=>x.id===S.world)||kids()[0];chrome(c.name+'s Welt');app.innerHTML=world(c)}
function educator(){chrome('Erzieherbereich');if(!S.unlocked){app.innerHTML=`<section class="card"><h2>Geschützter Bereich</h2><p class="muted">Standard-PIN: 2468</p><div class="form"><label>PIN</label><input id="ep" type="password" inputmode="numeric" maxlength="4"></div><button class="primary" id="unlock">Öffnen</button></section>`;unlock.onclick=()=>{if(ep.value===localStorage.mw_pin){S.unlocked=true;educator()}else msg('PIN ist nicht richtig.')};return}app.innerHTML=`<section class="grid"><button class="card child" id="manage"><span class="avatar">👧</span><strong>Kinder verwalten</strong><p class="muted tiny">hinzufügen oder löschen</p></button><button class="card child" id="manageTasks"><span class="avatar">📋</span><strong>Aufgaben verwalten</strong><p class="muted tiny">eigene Aufgaben anlegen</p></button><button class="card child" id="reset"><span class="avatar">↺</span><strong>Testdaten zurücksetzen</strong></button></section>`;manage.onclick=()=>go('manage');manageTasks.onclick=()=>go('tasksManage');reset.onclick=()=>{if(confirm('Alle Testdaten zurücksetzen?')){['mw_children','mw_tasks','mw_group'].forEach(k=>localStorage.removeItem(k));init();msg('Zurückgesetzt.');educator()}}}
function manage(){chrome('Kinder verwalten');app.innerHTML=`<div class="list">${kids().map(c=>`<div class="row"><span class="avatar" style="margin:0">${c.avatar}</span><div class="grow"><strong>${c.name}</strong><div class="muted">🌱 ${c.seeds} · 🪙 ${c.coins}</div></div><button class="danger" style="width:auto;padding:10px" data-del="${c.id}">Löschen</button></div>`).join('')}</div><section class="card" style="margin-top:14px"><h2>Neues Kind</h2><div class="form"><label>Name oder Spitzname</label><input id="nn" maxlength="20"></div><div class="form"><label>Avatar</label><select id="na"><option>🦊</option><option>🐼</option><option>🦁</option><option>🐸</option><option>🐨</option><option>🦄</option><option>🐯</option><option>🐙</option></select></div><button class="primary" id="add">Kind anlegen</button></section>`;document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{let id=b.dataset.del,c=kids().find(x=>x.id===id);if(confirm(c.name+' wirklich löschen?')){saveKids(kids().filter(x=>x.id!==id));manage()}});add.onclick=()=>{let n=nn.value.trim();if(!n)return msg('Bitte Namen eintragen.');let x=kids();x.push({id:'c'+Date.now(),name:n,avatar:na.value,seeds:0,coins:0,completed:0});saveKids(x);msg(n+' wurde angelegt.');manage()}}
function tasksManage(){chrome('Aufgaben verwalten');app.innerHTML=`<div class="list">${tasks().map(t=>`<div class="row"><span class="avatar" style="margin:0">${t.icon}</span><div class="grow"><strong>${t.title}</strong><div class="muted">🌱 ${t.seeds} · 🪙 ${t.reward}</div></div><button class="danger" style="width:auto;padding:10px" data-tdel="${t.id}">Löschen</button></div>`).join('')}</div><section class="card" style="margin-top:14px"><h2>Neue Aufgabe</h2><div class="form"><label>Bezeichnung</label><input id="tn" maxlength="28"></div><div class="form"><label>Symbol</label><select id="ti"><option>🧹</option><option>🛏️</option><option>🍽️</option><option>🧺</option><option>🪴</option><option>🗑️</option><option>👟</option><option>📚</option></select></div><div class="inline"><div class="form"><label>Münzen</label><input id="tr" type="number" min="1" max="20" value="5"></div><div class="form"><label>Samen</label><input id="ts" type="number" min="0" max="3" value="1"></div></div><button class="primary" id="tadd">Aufgabe anlegen</button></section>`;document.querySelectorAll('[data-tdel]').forEach(b=>b.onclick=()=>{let id=b.dataset.tdel,t=tasks().find(x=>x.id===id);if(confirm(t.title+' wirklich löschen?')){saveTasks(tasks().filter(x=>x.id!==id));tasksManage()}});tadd.onclick=()=>{let n=tn.value.trim();if(!n)return msg('Bitte eine Aufgabe eintragen.');let x=tasks();x.push({id:'t'+Date.now(),title:n,icon:ti.value,reward:Number(tr.value)||5,seeds:Number(ts.value)||0});saveTasks(x);msg('Aufgabe wurde angelegt.');tasksManage()}}
function render(){({home,select,order,choose,overview,pin,confirm,reward,worlds,childWorld,educator,manage,tasksManage}[S.screen]||home)()}init();render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body></html>
